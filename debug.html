<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KantinGo Debug</title>
  <style>
    body { font-family: monospace; background: #111; color: #0f0; padding: 20px; font-size: 13px; }
    h2 { color: #fff; }
    pre { background: #1a1a1a; padding: 16px; border-radius: 8px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
    .ok { color: #4ade80; }
    .err { color: #f87171; }
    .btn { background: #21a72a; color: #fff; border: none; padding: 10px 20px;
           border-radius: 8px; cursor: pointer; font-size: 14px; margin-bottom: 16px; }
    .info { color: #facc15; margin-bottom: 8px; }
  </style>
</head>
<body>
<h2>🔍 KantinGo — Debug JSONBin</h2>
<div class="info" id="status">Klik tombol untuk cek data...</div>
<button class="btn" onclick="cekData()">🔄 Cek Isi JSONBin Sekarang</button>
<button class="btn" style="background:#e74c3c;margin-left:8px" onclick="resetData()">🗑️ Reset JSONBin (kosongkan)</button>
<h3 style="color:#fff">Response JSONBin:</h3>
<pre id="out">—</pre>
<h3 style="color:#fff">Makanan tersimpan (<span id="jml-m">0</span> item):</h3>
<pre id="out-m">—</pre>
<h3 style="color:#fff">Minuman tersimpan (<span id="jml-mi">0</span> item):</h3>
<pre id="out-mi">—</pre>

<script>
const BIN_ID  = "69f9485836566621a82699c4";
const API_KEY = "$2a$10$yeNFeh35hEUuTVcEY4znkuLrYqTqLCZMpioDuaGPnZD0pGJJgAgLK";
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

async function cekData() {
  document.getElementById("status").textContent = "⏳ Mengambil data...";
  document.getElementById("status").className = "info";
  try {
    const res = await fetch(`${BIN_URL}/latest`, {
      headers: { "X-Master-Key": API_KEY }
    });
    const text = await res.text();
    document.getElementById("out").textContent = text;

    const json = JSON.parse(text);
    const data = json.record;

    const makanan = Array.isArray(data.makanan) ? data.makanan : [];
    const minuman = Array.isArray(data.minuman) ? data.minuman : [];

    document.getElementById("jml-m").textContent = makanan.length;
    document.getElementById("jml-mi").textContent = minuman.length;

    document.getElementById("out-m").textContent =
      makanan.length ? makanan.map(i => `ID:${i.id} | ${i.nama} | Rp${i.harga} | img: ${i.img?.substring(0,60)}...`).join("\n")
                     : "KOSONG — belum ada makanan";

    document.getElementById("out-mi").textContent =
      minuman.length ? minuman.map(i => `ID:${i.id} | ${i.nama} | Rp${i.harga} | img: ${i.img?.substring(0,60)}...`).join("\n")
                     : "KOSONG — belum ada minuman";

    document.getElementById("status").textContent =
      `✅ Berhasil! ${makanan.length} makanan, ${minuman.length} minuman`;
    document.getElementById("status").className = "ok";
  } catch(e) {
    document.getElementById("out").textContent = "ERROR: " + e.message;
    document.getElementById("status").textContent = "❌ Gagal: " + e.message;
    document.getElementById("status").className = "err";
  }
}

async function resetData() {
  if (!confirm("Reset semua data makanan & minuman di JSONBin?")) return;
  document.getElementById("status").textContent = "⏳ Mereset...";
  try {
    const res = await fetch(BIN_URL, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": API_KEY
      },
      body: JSON.stringify({ makanan: [], minuman: [] })
    });
    const json = await res.json();
    document.getElementById("out").textContent = JSON.stringify(json, null, 2);
    document.getElementById("status").textContent = "✅ JSONBin berhasil direset!";
    document.getElementById("status").className = "ok";
    document.getElementById("out-m").textContent = "KOSONG";
    document.getElementById("out-mi").textContent = "KOSONG";
    document.getElementById("jml-m").textContent = "0";
    document.getElementById("jml-mi").textContent = "0";
  } catch(e) {
    document.getElementById("status").textContent = "❌ Gagal reset: " + e.message;
    document.getElementById("status").className = "err";
  }
}

// Auto cek saat halaman dibuka
window.onload = cekData;
</script>
</body>
</html>
