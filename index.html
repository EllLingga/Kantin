<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KantinGo - Info Katalog</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f4f6f9;
      }
      .hero {
        height: 250px;
        background-size: cover;
        background-position: center;
        position: relative;
      }
      .hero-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.3),
          rgba(0, 0, 0, 0.7)
        );
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        text-align: center;
      }
      @media (min-width: 768px) {
        .hero {
          border-radius: 1rem;
          overflow: hidden;
          margin-top: 1.5rem;
        }
      }
      .menu-card {
        transition: all 0.3s ease;
      }
      @media (min-width: 768px) {
        .menu-card:hover {
          transform: translateY(-5px);
          box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1) !important;
        }
      }
      .bottom-nav {
        z-index: 1030;
      }
      .nav-item-btn {
        transition: 0.3s;
        cursor: pointer;
        color: #6c757d;
      }
      .nav-item-btn.active {
        color: #21a72abb !important;
        font-weight: bold;
        transform: translateY(-3px);
      }
      .top-nav-link {
        cursor: pointer;
        font-weight: 500;
        transition: 0.2s;
      }
      .top-nav-link.active {
        color: #21a72abb !important;
        font-weight: 700;
        border-bottom: 2px solid #21a72abb;
      }
    </style>
  </head>
  <body>
    <nav
      class="navbar navbar-expand-md bg-white shadow-sm sticky-top d-none d-md-flex py-3"
    >
      <div class="container">
        <a class="navbar-brand fw-bold fs-4" style="color: #21a72abb" href="#"
          ><i class="bi bi-shop"></i> KantinGo</a
        >
        <ul class="navbar-nav ms-auto gap-3">
          <li class="nav-item">
            <a
              class="nav-link top-nav-link active"
              data-target="home"
              onclick="switchPage('home')"
              ><i class="bi bi-house-door"></i> Beranda</a
            >
          </li>
          <li class="nav-item">
            <a
              class="nav-link top-nav-link"
              data-target="makanan"
              onclick="switchPage('makanan')"
              ><i class="bi bi-egg-fried"></i> Makanan</a
            >
          </li>
          <li class="nav-item">
            <a
              class="nav-link top-nav-link"
              data-target="minuman"
              onclick="switchPage('minuman')"
              ><i class="bi bi-cup-straw"></i> Minuman</a
            >
          </li>
        </ul>
      </div>
    </nav>

    <div class="container main-container pb-5 mb-5">
      <div id="pages">
        <div id="page-home" class="page-content">
          <div
            class="hero mb-4"
            style="background-image: url(&quot;Home.jpg&quot;)"
          >
            <div class="hero-overlay">
              <h1 class="fw-bold m-0 display-5">KantinGo</h1>
              <p
                class="text-uppercase m-0 mt-2 text-light"
                style="letter-spacing: 2px; font-size: 14px"
              >
                Katalog Info Menu
              </p>
            </div>
          </div>

          <div class="row justify-content-center g-4">
            <div class="col-md-8 col-lg-6">
              <div class="card shadow-sm border-0 rounded-4 p-2">
                <div class="card-body text-center">
                  <h5 class="card-title fw-bold mb-3" style="color: #21a72abb">
                    Informasi Kantin
                  </h5>
                  <div
                    class="d-flex justify-content-center gap-4 text-muted small mb-0"
                  >
                    <div>
                      <i
                        class="bi bi-geo-alt fs-4 d-block mb-1 text-danger"
                      ></i>
                      Lt. Dasar
                    </div>
                    <div>
                      <i class="bi bi-clock fs-4 d-block mb-1 text-warning"></i>
                      07:00 - 17:00
                    </div>
                    <div>
                      <i
                        class="bi bi-info-circle fs-4 d-block mb-1 text-info"
                      ></i>
                      Info Harga
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-12">
              <div class="card shadow-sm border-0 rounded-4 p-4 mt-2">
                <h5 class="fw-bold text-center mb-4" style="color: #21a72abb">
                  Tim Pengembang
                </h5>
                <div class="row row-cols-1 row-cols-md-3 g-4 text-center">
                  <div class="col menu-card">
                    <img
                      src="P3.jpg"
                      class="rounded-circle border border-2 border-primary mb-2"
                      width="70"
                    />
                    <h6 class="fw-bold mb-0">Andika</h6>
                    <small class="text-muted d-block mb-2"
                      >Lead Developer/PM</small
                    >
                  </div>
                  <div class="col menu-card">
                    <img
                      src="P2.jpg"
                      class="rounded-circle border border-2 border-success mb-2"
                      width="70"
                    />
                    <h6 class="fw-bold mb-0">Faathir</h6>
                    <small class="text-muted d-block mb-2"
                      >UI Designer/Riset</small
                    >
                  </div>
                  <div class="col menu-card">
                    <img
                      src="P1.png"
                      class="rounded-circle border border-2 border-warning mb-2"
                      width="70"
                    />
                    <h6 class="fw-bold mb-0">Lingga</h6>
                    <small class="text-muted d-block mb-2"
                      >Designer/Inovator</small
                    >
                  </div>
                </div>
                <div class="text-center mt-5">
                  <a
                    href="rating.html"
                    class="btn rounded-pill px-5 py-2 shadow-sm fw-bold"
                    style="
                      background-color: #21a72abb;
                      border-color: #21a72abb;
                      color: white;
                    "
                  >
                    <i class="bi bi-star-fill me-2 text-warning"></i>Beri Rating
                    Kantin
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div id="page-makanan" class="page-content d-none">
          <div
            class="hero mb-4"
            style="background-image: url(&quot;Food1.jpg&quot;)"
          >
            <div class="hero-overlay">
              <h2 class="fw-bold m-0 display-6">Info Makanan</h2>
            </div>
          </div>
          <div class="row g-3 px-2" id="list-makanan"></div>
        </div>

        <div id="page-minuman" class="page-content d-none">
          <div
            class="hero mb-4"
            style="
              background-image: url(&quot;https://images.unsplash.com/photo-1563227812-0ea4c22e6cc8?q=80&w=1200&quot;);
            "
          >
            <div class="hero-overlay">
              <h2 class="fw-bold m-0 display-6">Info Minuman</h2>
            </div>
          </div>
          <div class="row g-3 px-2" id="list-minuman"></div>
        </div>
      </div>
    </div>

    <nav
      class="fixed-bottom bg-white border-top d-flex justify-content-around py-2 bottom-nav shadow-lg d-md-none"
    >
      <div
        class="text-center nav-item-btn w-100"
        data-target="makanan"
        onclick="switchPage('makanan')"
      >
        <i class="bi bi-egg-fried fs-4 d-block"></i
        ><span style="font-size: 10px">Makanan</span>
      </div>
      <div
        class="text-center nav-item-btn w-100 active"
        data-target="home"
        onclick="switchPage('home')"
      >
        <i class="bi bi-house-door-fill fs-4 d-block"></i
        ><span style="font-size: 10px">Home</span>
      </div>
      <div
        class="text-center nav-item-btn w-100"
        data-target="minuman"
        onclick="switchPage('minuman')"
      >
        <i class="bi bi-cup-straw fs-4 d-block"></i
        ><span style="font-size: 10px">Minuman</span>
      </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const dataMenu = {
        makanan: [
          {
            id: 101,
            nama: "Nasi Goreng",
            harga: 5000,
            desc: "Nasi + Telur + Sosis + Kerupuk",
            img: "NasiGoreng.jpg",
          },
          {
            id: 102,
            nama: "Mie Gacoan",
            harga: 5000,
            desc: "Mie kenyal dengan kuah gurih",
            img: "MiwGacoan.jpeg",
          },
          {
            id: 103,
            nama: "Ayam Geprek Nasi",
            harga: 7000,
            desc: "Ayam crispy + sambal bawang",
            img: "NasiAyam.jpg",
          },
        ],
        minuman: [
          {
            id: 201,
            nama: "Es Teh Manis",
            harga: 3000,
            desc: "Segar dan dingin",
            img: "https://images.unsplash.com/photo-1556679343-c7306c1976bc?q=80&w=400",
          },
          {
            id: 202,
            nama: "Es Jeruk Peras",
            harga: 3000,
            desc: "100% Jeruk asli peras",
            img: "https://images.unsplash.com/photo-1600271886742-f049cd451bba?q=80&w=400",
          },
          {
            id: 203,
            nama: "Es Lumut",
            harga: 3000,
            desc: "Kopi blend dengan susu segar",
            img: "EsLumutIjo.jpg",
          },
        ],
      };

      function switchPage(pageId) {
        document
          .querySelectorAll(".page-content")
          .forEach((el) => el.classList.add("d-none"));
        document.getElementById("page-" + pageId).classList.remove("d-none");
        document
          .querySelectorAll(".nav-item-btn, .top-nav-link")
          .forEach((el) => el.classList.remove("active", "text-primary"));
        document
          .querySelectorAll(`[data-target="${pageId}"]`)
          .forEach((el) => el.classList.add("active"));

        window.scrollTo(0, 0);
      }

      function muatTampilanMenu() {
        const buatKartuHtml = (item) => `
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card menu-card shadow-sm h-100 border-0 border-start border-4 rounded-3"
                    style="border-color: #21a72abb !important;">
                        <div class="card-body d-flex align-items-center gap-3 p-3">
                            <img src="${
                              item.img
                            }" class="rounded-3 object-fit-cover shadow-sm" width="85" height="85" alt="${
                              item.nama
                            }">
                            <div class="flex-grow-1">
                                <h6 class="mb-1 fw-bold text-dark">${
                                  item.nama
                                }</h6>
                                <small class="text-muted d-block" style="font-size:12px; line-height:1.3;">${
                                  item.desc
                                }</small>
                                <span class="badge mt-2 fs-6" style="color: #21a72abb; background-color: rgba(33, 167, 42, 0.1);">Rp ${item.harga.toLocaleString(
                                  "id-ID",
                                )}</span>
                            </div>
                        </div>
                    </div>
                </div>`;
        document.getElementById("list-makanan").innerHTML = dataMenu.makanan
          .map(buatKartuHtml)
          .join("");
        document.getElementById("list-minuman").innerHTML = dataMenu.minuman
          .map(buatKartuHtml)
          .join("");
      }
      muatTampilanMenu();
    </script>
  </body>
</html>
