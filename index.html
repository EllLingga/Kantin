<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KantinGo - Katalog & Pesanan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root { --green:#21a72a; --green-a:rgba(33,167,42,.85); --green-soft:rgba(33,167,42,.1); --green-mid:rgba(33,167,42,.2); }
    * { box-sizing:border-box; }
    body { background:#f0f4f8; font-family:'Plus Jakarta Sans',sans-serif; }
    .t-main { color:var(--green-a)!important; }
    .b-main { background-color:var(--green-a)!important; }

    .top-navbar { background:#fff; box-shadow:0 2px 12px rgba(0,0,0,.07); }
    .top-nav-link { cursor:pointer; font-weight:600; font-size:.88rem; transition:.2s; color:#555; padding:6px 2px; }
    .top-nav-link.active { color:var(--green-a)!important; border-bottom:2.5px solid var(--green-a); }

    .hero { height:240px; background:center/cover; position:relative; }
    .hero-overlay { position:absolute; inset:0; background:linear-gradient(to bottom,rgba(0,0,0,.2),rgba(0,0,0,.72));
      display:flex; flex-direction:column; justify-content:center; align-items:center; color:#fff; text-align:center; }
    @media(min-width:768px){ .hero { border-radius:1rem; overflow:hidden; margin-top:1.5rem; height:280px; } }

    .menu-card { transition:.25s ease; border:none; border-radius:14px; }
    @media(min-width:768px){ .menu-card:hover { transform:translateY(-5px); box-shadow:0 12px 24px rgba(0,0,0,.1)!important; } }

    .bot-nav { background:#fff; border-top:1px solid #e8edf2; }
    .nav-item-btn { transition:.25s; cursor:pointer; color:#9aa5b4; font-size:10px; }
    .nav-item-btn.active { color:var(--green-a)!important; font-weight:700; transform:translateY(-2px); }

    #fab-cart { transition:transform .2s,box-shadow .2s; }
    #fab-cart:active { transform:scale(.88)!important; }
    #fab-cart.has-item { animation:fab-pulse 1.6s infinite; }
    @keyframes fab-pulse {
      0%,100%{ box-shadow:0 4px 18px rgba(33,167,42,.4); }
      50%{ box-shadow:0 4px 30px rgba(33,167,42,.15),0 0 0 10px rgba(33,167,42,.08); }
    }

    .sub-tab { display:inline-flex; gap:5px; background:#fff; border-radius:40px; padding:4px; box-shadow:0 2px 10px rgba(0,0,0,.07); }
    .sub-tab button { border:none; background:transparent; border-radius:30px; padding:5px 14px;
      font-weight:600; font-size:.8rem; color:#777; transition:.2s; font-family:inherit; cursor:pointer; }
    .sub-tab button.active { background:var(--green-a); color:#fff; }

    .search-wrap { position:relative; }
    .search-wrap input { border-radius:30px; border:none; background:#fff; padding:10px 18px 10px 42px;
      font-size:.875rem; box-shadow:0 2px 10px rgba(0,0,0,.07); width:100%; outline:none; font-family:inherit; }
    .search-wrap .bi-search { position:absolute; left:15px; top:50%; transform:translateY(-50%); color:#aaa; }

    .page { animation:fadeIn .25s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

    .skeleton { background:linear-gradient(90deg,#e8e8e8 25%,#f5f5f5 50%,#e8e8e8 75%);
      background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:12px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .sk-card { height:96px; }

    .empty-menu { text-align:center; color:#aaa; padding:50px 20px; }
    .empty-menu i { font-size:3.5rem; opacity:.15; display:block; margin-bottom:12px; }
  </style>
</head>
<body>

<!Navbar lah iki>
<nav class="top-navbar navbar navbar-expand-md sticky-top d-none d-md-flex py-3">

  <!Dinggo Home>
  <div id="p-home" class="page">
    <div class="hero mb-4" style="background-image:url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?q=80&w=1200')">
      <div class="hero-overlay">
        <h1 class="fw-bold m-0 display-5">KantinGo</h1>
        <p class="m-0 mt-2" style="letter-spacing:2px;font-size:13px;text-transform:uppercase;opacity:.85">Kantin SMKN 5 SURAKARTA</p>
      </div>
    </div>
    <div class="row justify-content-center g-4 mb-4">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 rounded-4 p-2 text-center">
          <div class="card-body">
            <h5 class="fw-bold mb-3 t-main">Informasi Kantin</h5>
            <div class="d-flex justify-content-center gap-4 text-muted small">
              <div><i class="bi bi-geo-alt fs-4 d-block mb-1 text-danger"></i>Lt. Dasar</div>
              <div><i class="bi bi-clock fs-4 d-block mb-1 text-warning"></i>07:00–17:00<span id="k-status" class="badge rounded-pill mt-1 d-block"></span></div>
              <div><i class="bi bi-info-circle fs-4 d-block mb-1 text-info"></i>Info Harga</div>

    <div class="card shadow-sm border-0 rounded-4 p-4 mb-4">

        <button class="btn btn-sm rounded-pill px-3 b-main text-white fw-bold" onclick="go('makanan')">Lihat Semua</button>

        <div class="col-12"><div class="skeleton sk-card"></div></div>

  <!Buat Maeman>
  <div id="p-makanan" class="page d-none">
    <div class="hero mb-4" style="background-image:url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1200')">
      <div class="hero-overlay"><h2 class="fw-bold m-0">Menu Makanan</h2></div>
    </div>
    <div class="d-flex align-items-center justify-content-between mb-3 px-1 flex-wrap gap-2">
      <span id="count-makanan" class="text-muted" style="font-size:.82rem"></span>
      <div class="sub-tab">
        <button class="active" onclick="filterMenu('makanan','all',this)">Semua</button>
        <button onclick="filterMenu('makanan','best',this)"><i class="bi bi-fire text-danger"></i> Best</button>
      </div>
    </div>
    <div class="search-wrap mb-3 px-1">
      <i class="bi bi-search"></i>
      <input type="text" id="search-makanan" placeholder="Cari makanan..." oninput="renderMenu('makanan')">
    </div>
    <div class="row g-3 px-1" id="l-makanan">
      <div class="col-12"><div class="skeleton sk-card"></div></div>
      <div class="col-12"><div class="skeleton sk-card"></div></div>

  </div>

  <!anu Minum>
  <div id="p-minuman" class="page d-none">
    <div class="hero mb-4" style="background-image:url('https://images.unsplash.com/photo-1563227812-0ea4c22e6cc8?q=80&w=1200')">
      <div class="hero-overlay"><h2 class="fw-bold m-0">Menu Minuman</h2></div>
    </div>
    <div class="d-flex align-items-center justify-content-between mb-3 px-1 flex-wrap gap-2">
      <span id="count-minuman" class="text-muted" style="font-size:.82rem"></span>
      <div class="sub-tab">
        <button class="active" onclick="filterMenu('minuman','all',this)">Semua</button>
        <button onclick="filterMenu('minuman','best',this)"><i class="bi bi-fire text-danger"></i> Best</button>
      </div>
    </div>
    <div class="search-wrap mb-3 px-1">
      <i class="bi bi-search"></i>
      <input type="text" id="search-minuman" placeholder="Cari minuman..." oninput="renderMenu('minuman')">
    </div>
    <div class="row g-3 px-1" id="l-minuman">
      <div class="col-12"><div class="skeleton sk-card"></div></div>
      <div class="col-12"><div class="skeleton sk-card"></div></div>

<!Ini Anu Nav BWah>
<nav class="bot-nav fixed-bottom d-flex justify-content-around py-2 shadow-lg d-md-none" style="z-index:1040">
  <div class="text-center nav-item-btn w-100 active" data-target="home" onclick="go('home')">
    <i class="bi bi-house-door-fill fs-4 d-block"></i><span>Home</span>
  </div>
  <div class="text-center nav-item-btn w-100" data-target="makanan" onclick="go('makanan')">
    <i class="bi bi-egg-fried fs-4 d-block"></i><span>Makanan</span>
  </div>
  <div class="text-center nav-item-btn w-100" data-target="minuman" onclick="go('minuman')">

<!Keranjang Ketok e>
<button class="d-md-none btn text-white rounded-circle shadow-lg d-flex align-items-center justify-content-center b-main position-fixed"
  id="fab-cart" data-bs-toggle="modal" data-bs-target="#cartModal"
  style="width:60px;height:60px;bottom:82px;right:18px;z-index:1050;font-size:22px;border:none;">
  <i class="bi bi-cart3"></i>
  <span id="c-mob" class="position-absolute badge rounded-pill bg-warning text-dark"
    style="top:4px;right:4px;font-size:9px;min-width:18px;padding:2px 5px;">0</span>
</button>

<!Modal Keranjang>
<div class="modal fade" id="cartModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content border-0 rounded-4">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold mb-0">Keranjang Pesanan</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4" id="c-items"></div>
      <div class="modal-footer border-0 flex-column align-items-stretch d-none" id="c-footer">
        <div class="d-flex justify-content-between fw-bold fs-5 mb-3 px-2">
          <span>Total:</span><span class="t-main" id="c-total">Rp 0</span>
        </div>
        <button class="btn btn-lg rounded-pill fw-bold text-white shadow-sm b-main" onclick="checkout()">
          <i class="bi bi-bag-check me-2"></i>Pesan Sekarang
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const JSONBIN_BIN_ID  = "69f9485836566621a82699c4";
const JSONBIN_API_KEY = "$2a$10$yeNFeh35hEUuTVcEY4znkuLrYqTqLCZMpioDuaGPnZD0pGJJgAgLK";
const BIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`;
const $ = id => document.getElementById(id), $$ = s => document.querySelectorAll(s);

const team = [
  {n:"Andika", r:"Lead Developer", img:"P3.jpg", c:"primary"},
  {n:"Faathir", r:"UI Designer",   img:"P2.jpg", c:"success"},
  {n:"Lingga", r:"Inovator",       img:"P1.png", c:"warning"}
];

let menuData = { makanan: [], minuman: [] };
let cart = [];
let menuFilter = { makanan:"all", minuman:"all" };
const COLOR = "#21a72a";

// FETCH SEKO JSONBIN
async function loadMenu() {
  try {
    const res = await fetch(BIN_URL, {
      headers: { "X-Master-Key": JSONBIN_API_KEY }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const data = json.record;
    menuData.makanan = Array.isArray(data.makanan) ? data.makanan : [];
    menuData.minuman = Array.isArray(data.minuman) ? data.minuman : [];
  } catch (e) {
    console.error("Gagal fetch menu:", e);
    // Tampilkan pesan kosong, bukan data palsu
    menuData = { makanan: [], minuman: [] };
  }
  renderMenu("makanan");
  renderMenu("minuman");
  renderBestPreview();
}

// iki navigasi ketok e
const go = id => {
  $$(".page").forEach(e => e.classList.add("d-none"));
  $(`p-${id}`).classList.remove("d-none");
  $$(".nav-item-btn,.top-nav-link").forEach(e => e.classList.remove("active"));
  $$(`[data-target="${id}"]`).forEach(e => e.classList.add("active"));
  scrollTo(0, 0);
};

// Buat Ngefilter
const filterMenu = (type, mode, btn) => {
  menuFilter[type] = mode;
  $$(`#p-${type} .sub-tab button`).forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderMenu(type);
};

const renderMenu = type => {
  const q = ($(`search-${type}`)?.value || "").toLowerCase();
  const items = (menuData[type] || []).filter(i =>
    (menuFilter[type] === "best" ? i.best : true) &&
    (!q || i.nama.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q))
  );

  const countEl = $(`count-${type}`);
  if (countEl) countEl.textContent = `${items.length} item tersedia`;

  const tpl = i => `
    <div class="col-12 col-md-6 col-lg-4">
      <div class="card menu-card shadow-sm h-100 border-start border-4" style="border-color:${COLOR}!important">
        <div class="card-body d-flex align-items-center gap-3 p-3">
          <img src="${i.img || ''}" class="rounded-3 object-fit-cover shadow-sm flex-shrink-0" width="82" height="82"
            onerror="this.style.background='#e8edf2';this.style.opacity='0.4'">
          <div class="flex-grow-1 min-w-0">
            <div class="d-flex flex-wrap gap-1 mb-1">
              ${i.best ? `<span class="badge bg-danger" style="font-size:.6rem"><i class="bi bi-fire"></i> Best</span>` : ''}
              <span class="badge bg-light text-secondary border" style="font-size:.6rem">${i.kategori || '-'}</span>
            </div>
            <h6 class="mb-0 fw-bold" style="font-size:.88rem">${i.nama}</h6>
            <small class="text-muted d-block mb-2 mt-1" style="font-size:.75rem">${i.desc}</small>
            <div class="d-flex justify-content-between align-items-center">
              <span class="fw-bold" style="color:${COLOR};font-size:.85rem">Rp ${Number(i.harga).toLocaleString("id-ID")}</span>
              <button class="btn btn-sm text-white rounded-pill px-3"
                style="background:${COLOR};border:none;font-size:.8rem" onclick="addCart(${i.id})">
                <i class="bi bi-plus-lg"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>`;

  $(`l-${type}`).innerHTML = items.length
    ? items.map(tpl).join('')
    : `<div class="empty-menu col-12"><i class="bi bi-search"></i><p>Tidak ada menu ditemukan</p></div>`;
};

const renderBestPreview = () => {
  const all = [...(menuData.makanan || []), ...(menuData.minuman || [])].filter(i => i.best).slice(0, 4);
  if (!all.length) {
    $("best-preview").innerHTML = `<div class="col-12 text-center text-muted py-3" style="font-size:.85rem">Belum ada menu best seller</div>`;
    return;
  }
  $("best-preview").innerHTML = all.map(i => `
    <div class="col-12 col-md-6">
      <div class="card border-0 shadow-sm rounded-3 d-flex flex-row align-items-center gap-3 p-3">
        <img src="${i.img || ''}" class="rounded-3 object-fit-cover flex-shrink-0" width="60" height="60"
          onerror="this.style.background='#e8edf2';this.style.opacity='0.4'">
        <div class="flex-grow-1 min-w-0">
          <h6 class="mb-0 fw-bold text-truncate" style="font-size:.85rem">${i.nama}</h6>
          <small class="text-muted" style="font-size:.72rem">${i.desc}</small><br>
          <span class="fw-bold t-main" style="font-size:.82rem">Rp ${Number(i.harga).toLocaleString("id-ID")}</span>
        </div>
        <button class="btn btn-sm text-white rounded-pill px-2 flex-shrink-0 b-main" onclick="addCart(${i.id})">
          <i class="bi bi-plus-lg"></i>
        </button>
      </div>
    </div>`).join('');
};

// Nah iki Keranjang Utama
const allItems = () => [...(menuData.makanan || []), ...(menuData.minuman || [])];

const addCart = id => {
  const item = allItems().find(i => i.id === id);
  if (!item) return;
  const ext = cart.find(i => i.id === id);
  ext ? ext.qty++ : cart.push({ ...item, qty:1, note:"" });
  updCart();
  Swal.mixin({ toast:true, position:"top", showConfirmButton:false, timer:1400 })
    .fire({ icon:"success", title:`${item.nama} ditambah` });
};

const modQty = (id, d) => {
  const idx = cart.findIndex(i => i.id === id);
  if (idx > -1 && (cart[idx].qty += d) <= 0) cart.splice(idx, 1);
  updCart();
};

const updNote = (id, val) => { const i = cart.find(x => x.id === id); if (i) i.note = val; };

const updCart = () => {
  const totQty = cart.reduce((s,i) => s + i.qty, 0);
  const totPr  = cart.reduce((s,i) => s + i.harga * i.qty, 0);
  $("c-desk").innerText = $("c-mob").innerText = totQty;
  $("c-total").innerText = `Rp ${totPr.toLocaleString("id-ID")}`;
  $("fab-cart").classList.toggle("has-item", totQty > 0);

  if (!cart.length) {
    $("c-items").innerHTML = `<div class="text-center text-muted py-4"><i class="bi bi-cart-x fs-1 d-block mb-2 opacity-25"></i><p>Keranjang kosong</p></div>`;
    $("c-footer").classList.add("d-none");
  } else {
    $("c-footer").classList.remove("d-none");
    $("c-items").innerHTML = cart.map(i => `
      <div class="mb-3 pb-3 border-bottom">
        <div class="d-flex align-items-center gap-3">
          <img src="${i.img||''}" class="rounded-3 object-fit-cover flex-shrink-0" width="48" height="48"
            onerror="this.style.background='#e8edf2';this.style.opacity='0.4'">
          <div class="flex-grow-1">
            <h6 class="mb-0 fw-bold" style="font-size:.88rem">${i.nama}</h6>
            <small class="text-success fw-bold">Rp ${Number(i.harga).toLocaleString("id-ID")}</small>
          </div>
          <div class="d-flex align-items-center gap-1 flex-shrink-0">
            <button class="btn btn-sm btn-outline-secondary rounded-circle"
              style="width:28px;height:28px;padding:0;line-height:1.6" onclick="modQty(${i.id},-1)">-</button>
            <span class="fw-bold px-1">${i.qty}</span>
            <button class="btn btn-sm btn-outline-success rounded-circle"
              style="width:28px;height:28px;padding:0;line-height:1.6" onclick="modQty(${i.id},1)">+</button>
          </div>
        </div>
        <input type="text" class="form-control form-control-sm mt-2 rounded-3"
          placeholder="Catatan..." value="${i.note}" oninput="updNote(${i.id},this.value)">
      </div>`).join('');
  }
};

// Buat Chekout
const checkout = () => {
  bootstrap.Modal.getInstance($("cartModal")).hide();
  Swal.fire({ title:"Memproses...", timer:1000, didOpen:()=>Swal.showLoading(), showConfirmButton:false }).then(() => {
    Swal.fire({
      title:"Metode Pembayaran",
      html:`<button class="btn btn-outline-primary w-100 mb-2 py-2 fw-bold" onclick="qris()"><i class="bi bi-qr-code-scan me-2"></i>QRIS</button>
            <button class="btn btn-outline-success w-100 py-2 fw-bold" onclick="sukses('Tunai')"><i class="bi bi-cash-coin me-2"></i>Tunai di Kasir</button>`,
      showConfirmButton:false, showCancelButton:true, cancelButtonText:"Batal"
    });
  });
};

const qris = () => {
  const pr = cart.reduce((s,i) => s + i.harga * i.qty, 0);
  Swal.fire({
    title:"Scan QRIS",
    html:`<p class="text-muted small">Scan via E-Wallet / M-Banking</p>
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=KantinGo:Rp${pr}"
            class="border rounded p-1 mb-3" width="200">
          <h5 class="fw-bold t-main">Rp ${pr.toLocaleString("id-ID")}</h5>`,
    showCancelButton:true, confirmButtonText:"Sudah Bayar", confirmButtonColor:"#21a72abb"
  }).then(r => r.isConfirmed && sukses("QRIS"));
};

const sukses = m => {
  Swal.fire({ title:"Verifikasi...", timer:1500, didOpen:()=>Swal.showLoading(), showConfirmButton:false }).then(() => {
    Swal.fire({ icon:"success", title:"Berhasil!", text: m==="QRIS"?"Pembayaran berhasil!":"Bayar di kasir ya!", confirmButtonColor:"#21a72abb" });
    cart = []; updCart();
  });
};

// Bukak tutup Kantin
const cekKantin = () => {
  const jam = new Date().getHours(), buka = jam >= 7 && jam < 17;
  const el = $("k-status");
  el.innerText = buka ? "BUKA" : "TUTUP";
  el.className = `badge rounded-pill mt-1 d-block shadow-sm ${buka ? 'bg-success' : 'bg-danger'}`;
};

// Mbuh Manut tutorial yutub
$("team-list").innerHTML = team.map(t => `
  <div class="col">
