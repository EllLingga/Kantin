<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KantinGo - Katalog & Pesanan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --green: #21a72a;
      --green-a: rgba(33,167,42,.9);
      --green-soft: rgba(33,167,42,.08);
      --green-mid: rgba(33,167,42,.18);
      --bg: #f0f7f1;
      --card-bg: #ffffff;
      --shadow: 0 4px 20px rgba(33,167,42,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      overflow-x: hidden;
    }

    /* PARTICLES BG */
    #particles-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .particle {
      position: absolute; border-radius: 50%;
      background: var(--green-mid);
      animation: floatParticle linear infinite;
      opacity: 0;
    }
    @keyframes floatParticle {
      0% { transform: translateY(110vh) scale(0); opacity: 0; }
      10% { opacity: .4; }
      90% { opacity: .2; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    /* NAVBAR */
    .top-navbar {
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(14px);
      box-shadow: 0 2px 20px rgba(33,167,42,.1);
      z-index: 1030;
      position: sticky; top: 0;
    }
    .brand-logo {
      font-family: 'Pacifico', cursive;
      color: var(--green-a);
      font-size: 1.5rem;
      letter-spacing: .5px;
    }
    .nav-link-custom {
      font-weight: 700; font-size: .88rem; color: #555;
      padding: 6px 14px; border-radius: 20px;
      transition: all .25s; cursor: pointer;
    }
    .nav-link-custom:hover { background: var(--green-soft); color: var(--green); }
    .nav-link-custom.active {
      background: var(--green-a); color: #fff !important;
    }

    /* PAGES */
    .page { animation: pageIn .35s cubic-bezier(.25,.46,.45,.94); }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(16px) scale(.98); }
      to   { opacity: 1; transform: none; }
    }

    /* HERO  */
    .hero {
      height: 260px; background: center/cover; position: relative;
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 8px 40px rgba(33,167,42,.18);
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,0,0,.15) 0%, rgba(33,167,42,.55) 100%);
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      color: #fff; text-align: center;
    }
    .hero-title {
      font-family: 'Pacifico', cursive;
      font-size: 3rem;
      text-shadow: 0 4px 20px rgba(0,0,0,.3);
      animation: heroTitleIn .8s ease both;
    }
    .hero-sub {
      letter-spacing: 3px; font-size: 12px;
      text-transform: uppercase; opacity: .9; margin-top: 8px;
      animation: heroSubIn 1s ease .2s both;
    }
    @keyframes heroTitleIn {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes heroSubIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: .9; transform: none; }
    }

    /* CARDS */
    .menu-card {
      border: none; border-radius: 18px; overflow: hidden;
      transition: transform .3s ease, box-shadow .3s ease;
      background: var(--card-bg);
      animation: cardIn .4s ease both;
    }
    .menu-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 16px 40px rgba(33,167,42,.15) !important;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: none; }
    }
    .menu-card-img {
      width: 88px; height: 88px; object-fit: cover;
      border-radius: 14px; flex-shrink: 0;
      background: linear-gradient(135deg,#e8f5e9,#c8e6c9);
    }
    .add-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--green-a); border: none; color: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; cursor: pointer; font-size: 18px;
      flex-shrink: 0;
    }
    .add-btn:hover { transform: scale(1.15) rotate(90deg); background: var(--green); }
    .add-btn:active { transform: scale(.9); }

    /* SECTION CARD */
    .section-card {
      background: var(--card-bg);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    /* info card */
    .info-icon-card {
      border-radius: 16px; padding: 16px 12px;
      text-align: center; transition: transform .25s;
      animation: popIn .5s ease both;
    }
    .info-icon-card:hover { transform: translateY(-4px); }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.8); }
      to   { opacity: 1; transform: none; }
    }
    .info-icon {
      width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; margin: 0 auto 10px;
    }

    /* SUB TAB */
    .sub-tab {
      display: inline-flex; gap: 4px;
      background: #fff; border-radius: 40px; padding: 4px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
    }
    .sub-tab button {
      border: none; background: transparent; border-radius: 30px;
      padding: 6px 16px; font-weight: 700; font-size: .8rem;
      color: #888; transition: all .2s; font-family: inherit; cursor: pointer;
    }
    .sub-tab button.active { background: var(--green-a); color: #fff; }

    /* SEARCH */
    .search-wrap { position: relative; }
    .search-wrap input {
      border-radius: 30px; border: 2px solid #e8f5e9;
      background: #fff; padding: 11px 18px 11px 44px;
      font-size: .875rem; width: 100%; outline: none;
      font-family: inherit; transition: border .2s;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .search-wrap input:focus { border-color: var(--green); }
    .search-wrap .bi-search {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%); color: #aaa;
    }

    /* BADGES  */
    .badge-best {
      background: linear-gradient(135deg,#ff6b6b,#ee0979);
      color: #fff; font-size: .6rem; padding: 3px 8px;
      border-radius: 20px; font-weight: 800;
    }

    /* FAB  */
    #fab-cart {
      width: 60px; height: 60px; bottom: 86px; right: 18px;
      z-index: 1050; font-size: 22px; border: none;
      transition: transform .25s, box-shadow .25s;
    }
    #fab-cart:active { transform: scale(.88) !important; }
    #fab-cart.has-item {
      animation: fabPulse 1.8s infinite;
    }
    @keyframes fabPulse {
      0%,100% { box-shadow: 0 4px 20px rgba(33,167,42,.4); }
      50% { box-shadow: 0 4px 40px rgba(33,167,42,.15), 0 0 0 12px rgba(33,167,42,.08); }
    }

    /* ntah */
    .bot-nav { background: rgba(255,255,255,.95); backdrop-filter: blur(14px); border-top: 1px solid #e8f5e9; }
    .nav-item-btn {
      cursor: pointer; color: #b0bec5; font-size: 10px;
      font-weight: 700; transition: all .2s;
    }
    .nav-item-btn.active { color: var(--green-a); transform: translateY(-2px); }
    .nav-item-btn i { display: block; font-size: 1.45rem; margin-bottom: 2px; }

    /* tulang */
    .skeleton {
      background: linear-gradient(90deg,#eaf5eb 25%,#f5fdf5 50%,#eaf5eb 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite; border-radius: 14px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .sk-card { height: 100px; }

    /* pemvuat card */
    .team-card {
      border-radius: 18px; overflow: hidden;
      transition: transform .3s; animation: cardIn .5s ease both;
    }
    .team-card:hover { transform: translateY(-6px); }
    .team-avatar {
      width: 76px; height: 76px; border-radius: 50%;
      object-fit: cover; margin: 0 auto;
      border: 3px solid var(--green-a);
      display: block;
    }

    /* kalo menu kosong */
    .empty-menu {
      text-align: center; color: #aaa; padding: 50px 20px;
    }
    .empty-menu i { font-size: 3.5rem; opacity: .15; display: block; margin-bottom: 12px; }

    /* buka tutup kantin */
    .status-badge {
      font-size: .72rem; font-weight: 800; padding: 4px 12px;
      border-radius: 20px; display: inline-block; margin-top: 4px;
    }

    /* Menu Best */
    .best-card {
      border-radius: 18px; overflow: hidden; border: none;
      transition: transform .3s, box-shadow .3s;
      background: var(--card-bg);
      animation: cardIn .4s ease both;
    }
    .best-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 14px 36px rgba(33,167,42,.13) !important;
    }

    /* Delay dinggo nampilin card */
    .stagger-1 { animation-delay: .05s; }
    .stagger-2 { animation-delay: .1s; }
    .stagger-3 { animation-delay: .15s; }
    .stagger-4 { animation-delay: .2s; }
    .stagger-5 { animation-delay: .25s; }
    .stagger-6 { animation-delay: .3s; }

    /* wave divider */
    .wave-divider {
      overflow: hidden; line-height: 0;
      transform: rotate(180deg);
    }
    .wave-divider svg { display: block; }

    /* item sing di keranjang */
    .cart-item-row { transition: background .2s; border-radius: 12px; padding: 8px; }
    .cart-item-row:hover { background: var(--green-soft); }
    .qty-btn {
      width: 30px; height: 30px; border-radius: 50%; border: 2px solid #e0e0e0;
      background: #fff; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .2s; font-size: 16px; font-weight: 700;
    }
    .qty-btn:hover { border-color: var(--green); color: var(--green); }

    /* Ribbon */
    .ribbon {
      position: absolute; top: 10px; left: -6px;
      background: linear-gradient(135deg,#ff6b6b,#ee0979);
      color: #fff; font-size: .62rem; font-weight: 800;
      padding: 4px 10px; border-radius: 0 4px 4px 0;
      letter-spacing: .5px;
    }
    .ribbon::before {
      content: ''; position: absolute; left: 0; bottom: -6px;
      border: 3px solid #b30000;
      border-right-color: transparent; border-bottom-color: transparent;
    }

    /* Mefia */
    @media (max-width: 767px) {
      .hero { border-radius: 14px; height: 200px; }
      .hero-title { font-size: 2.2rem; }
      .container { padding-left: 12px; padding-right: 12px; }
    }
  </style>
</head>

// Menu Ne

};

// Emoji fallback

  "Lauk":"🍗","Nasi":"🍚","Mie":"🍜","Dessert":"🍦","Snack":"🌯",
  "Dingin":"🧊","Botol":"💧","Umum":"🍽️"
};

const COLOR = "#21a72a";
let menuFilter = { makanan: "all", minuman: "all" };
let cart = [];

// iki tutor seka yutub
function getMenuData() {
  const extra = JSON.parse(localStorage.getItem("kg_extra_menu") || '{"makanan":[],"minuman":[]}');
  return {
    makanan: [...DEFAULT_MENU.makanan, ...(extra.makanan || [])],
    minuman: [...DEFAULT_MENU.minuman, ...(extra.minuman || [])]
  };
}

let menuData = getMenuData();

// Navigasi iki
const go = id => {
  $$(".page").forEach(e => e.classList.add("d-none"));
  $(`p-${id}`).classList.remove("d-none");
  $$(".nav-item-btn,.nav-link-custom").forEach(e => e.classList.remove("active"));
  $$(`[data-target="${id}"]`).forEach(e => e.classList.add("active"));
  scrollTo({ top: 0, behavior: "smooth" });
};

// manut tutor yutub
const filterMenu = (type, mode, btn) => {
  menuFilter[type] = mode;
  $$(`#p-${type} .sub-tab button`).forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderMenu(type);
};

const renderMenu = type => {
  const q = ($(`search-${type}`)?.value || "").toLowerCase();
  const items = (menuData[type] || []).filter(i =>
    (menuFilter[type] === "best" ? i.best : true) &&
    (!q || i.nama.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q))
  );

  const countEl = $(`count-${type}`);
  if (countEl) countEl.textContent = `${items.length} menu tersedia`;

  const tpl = (i, idx) => {
    const emoji = EMOJI_MAP[i.kategori] || "🍽️";
    const imgSrc = i.img;
    return `
    <div class="col-12 col-md-6 col-lg-4 stagger-${Math.min(idx+1,6)}">
      <div class="card menu-card shadow-sm h-100 position-relative">
        ${i.best ? `<span class="ribbon">🔥 BEST</span>` : ''}
        <div class="card-body d-flex align-items-center gap-3 p-3">
          <div style="position:relative;flex-shrink:0">
            <img src="${imgSrc}" class="menu-card-img"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
              style="display:block">
            <div style="width:88px;height:88px;border-radius:14px;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);display:none;align-items:center;justify-content:center;font-size:2.5rem;flex-shrink:0">
              ${emoji}
            </div>
          </div>
          <div class="flex-grow-1 min-w-0">
            <div class="d-flex flex-wrap gap-1 mb-1">
              <span class="badge bg-light text-secondary border" style="font-size:.6rem">${i.kategori || '-'}</span>
            </div>
            <h6 class="mb-1 fw-800" style="font-size:.9rem">${i.nama}</h6>
            <small class="text-muted d-block mb-2" style="font-size:.75rem;line-height:1.4">${i.desc}</small>
            <div class="d-flex justify-content-between align-items-center">
              <span class="fw-800" style="color:${COLOR};font-size:.9rem">Rp ${Number(i.harga).toLocaleString("id-ID")}</span>
              <button class="add-btn" onclick="addCart(${i.id})">
                <i class="bi bi-plus-lg" style="font-size:.9rem"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  };

  $(`l-${type}`).innerHTML = items.length
    ? items.map(tpl).join('')
    : `<div class="empty-menu col-12"><i class="bi bi-search"></i><p class="fw-700">Tidak ada menu ditemukan</p></div>`;
};

// Tampisan Best seler
const renderBestPreview = () => {
  const all = [...(menuData.makanan || []), ...(menuData.minuman || [])].filter(i => i.best).slice(0, 4);
  if (!all.length) {
    $("best-preview").innerHTML = `<div class="col-12 text-center text-muted py-3" style="font-size:.85rem">Belum ada menu best seller</div>`;
    return;
  }
  $("best-preview").innerHTML = all.map((i, idx) => {
    const emoji = EMOJI_MAP[i.kategori] || "🍽️";
    return `
    <div class="col-12 col-md-6 stagger-${idx+1}">
      <div class="best-card card shadow-sm d-flex flex-row align-items-center gap-3 p-3">
        <div style="position:relative;flex-shrink:0">
          <img src="${i.img}" class="rounded-3 object-fit-cover flex-shrink-0" width="60" height="60"
            style="object-fit:cover;background:#e8f5e9"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div style="width:60px;height:60px;border-radius:10px;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);display:none;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0">
            ${emoji}
          </div>
        </div>
        <div class="flex-grow-1 min-w-0">
          <h6 class="mb-0 fw-800 text-truncate" style="font-size:.88rem">${i.nama}</h6>
          <small class="text-muted" style="font-size:.72rem">${i.desc}</small><br>
          <span class="fw-800" style="color:${COLOR};font-size:.85rem">Rp ${Number(i.harga).toLocaleString("id-ID")}</span>
        </div>
        <button class="add-btn flex-shrink-0" onclick="addCart(${i.id})">
          <i class="bi bi-plus-lg" style="font-size:.9rem"></i>
        </button>
      </div>
    </div>`;
  }).join('');
};

// Anu Iki Keranjang
const allItems = () => [...(menuData.makanan || []), ...(menuData.minuman || [])];

const addCart = id => {
  const item = allItems().find(i => i.id === id);
  if (!item) return;
  const ext = cart.find(i => i.id === id);
  ext ? ext.qty++ : cart.push({ ...item, qty: 1, note: "" });
  updCart();
  Swal.mixin({ toast: true, position: "top", showConfirmButton: false, timer: 1400 })
    .fire({ icon: "success", title: `${item.nama} ditambah 🎉` });
};

const modQty = (id, d) => {
  const idx = cart.findIndex(i => i.id === id);
  if (idx > -1 && (cart[idx].qty += d) <= 0) cart.splice(idx, 1);
  updCart();
};

const updNote = (id, val) => { const i = cart.find(x => x.id === id); if (i) i.note = val; };

const updCart = () => {
  const totQty = cart.reduce((s, i) => s + i.qty, 0);
  const totPr  = cart.reduce((s, i) => s + i.harga * i.qty, 0);
  $("c-desk").innerText = $("c-mob").innerText = totQty;
  $("c-total").innerText = `Rp ${totPr.toLocaleString("id-ID")}`;
  $("fab-cart").classList.toggle("has-item", totQty > 0);

  if (!cart.length) {
    $("c-items").innerHTML = `
      <div class="text-center text-muted py-5">
        <div style="font-size:4rem;opacity:.15">🛒</div>
        <p class="mt-2 fw-700">Keranjang masih kosong</p>
      </div>`;
    $("c-footer").classList.add("d-none");
  } else {
    $("c-footer").classList.remove("d-none");
    $("c-items").innerHTML = cart.map(i => {
      const emoji = EMOJI_MAP[i.kategori] || "🍽️";
      return `
      <div class="cart-item-row mb-2">
        <div class="d-flex align-items-center gap-3">
          <div style="position:relative;flex-shrink:0">
            <img src="${i.img||''}" class="rounded-3" width="50" height="50" style="object-fit:cover;background:#e8f5e9"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div style="width:50px;height:50px;border-radius:10px;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);display:none;align-items:center;justify-content:center;font-size:1.6rem">
              ${emoji}
            </div>
          </div>
          <div class="flex-grow-1">
            <h6 class="mb-0 fw-800" style="font-size:.88rem">${i.nama}</h6>
            <small class="fw-700" style="color:${COLOR}">Rp ${Number(i.harga).toLocaleString("id-ID")}</small>
          </div>
          <div class="d-flex align-items-center gap-2 flex-shrink-0">
            <div class="qty-btn" onclick="modQty(${i.id},-1)">−</div>
            <span class="fw-800 px-1">${i.qty}</span>
            <div class="qty-btn" onclick="modQty(${i.id},1)" style="border-color:var(--green);color:var(--green)">+</div>
          </div>
        </div>
        <input type="text" class="form-control form-control-sm mt-2 rounded-3"
          placeholder="Catatan (opsional)..." value="${i.note}"
          oninput="updNote(${i.id},this.value)"
          style="font-size:.8rem;border:1.5px solid #e0e0e0;font-family:inherit">
      </div>`;
    }).join('');
  }
};

// Buat Checkout Kayak e
const checkout = () => {
  bootstrap.Modal.getInstance($("cartModal")).hide();
  Swal.fire({
    title: "Metode Pembayaran",
    html: `
      <button class="btn btn-outline-primary w-100 mb-2 py-3 fw-700 rounded-pill" onclick="qris()">
        <i class="bi bi-qr-code-scan me-2 fs-5"></i>Bayar via QRIS
      </button>
      <button class="btn btn-outline-success w-100 py-3 fw-700 rounded-pill" onclick="sukses('Tunai')">
        <i class="bi bi-cash-coin me-2 fs-5"></i>Tunai di Kasir
      </button>`,
    showConfirmButton: false, showCancelButton: true, cancelButtonText: "Batal",
    customClass: { popup: "rounded-4" }
  });
};

const qris = () => {
  const pr = cart.reduce((s, i) => s + i.harga * i.qty, 0);
  Swal.fire({
    title: "Scan QRIS",
    html: `<p class="text-muted small">Scan via E-Wallet / M-Banking</p>
           <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=KantinGo:Rp${pr}"
             class="border rounded-3 p-1 mb-3" width="200">
           <h5 class="fw-800" style="color:var(--green-a)">Rp ${pr.toLocaleString("id-ID")}</h5>`,
    showCancelButton: true, confirmButtonText: "✅ Sudah Bayar",
    confirmButtonColor: "#21a72a",
    customClass: { popup: "rounded-4" }
  }).then(r => r.isConfirmed && sukses("QRIS"));
};

const sukses = m => {
  Swal.fire({
    title: "Memproses...", timer: 1500,
    didOpen: () => Swal.showLoading(), showConfirmButton: false
  }).then(() => {
    Swal.fire({
      icon: "success", title: "Berhasil! 🎉",
      text: m === "QRIS" ? "Pembayaran QRIS berhasil!" : "Silakan bayar di kasir ya!",
      confirmButtonColor: "#21a72a",
      customClass: { popup: "rounded-4" }
    });
    cart = []; updCart();
  });
};

// dinggo Bukak Tutup 
const cekKantin = () => {
  const jam = new Date().getHours();
  const buka = jam >= 7 && jam < 17;
  const el = $("k-status");
  el.innerText = buka ? "BUKA" : "TUTUP";
  el.className = `status-badge ${buka ? 'bg-success text-white' : 'bg-danger text-white'}`;
};

const team = [
  { n: "Andika", r: "Lead Developer", img: "P3.jpg", color: "#4a90e2" },
  { n: "Faathir", r: "UI Designer",   img: "P2.jpg", color: "#21a72a" },
  { n: "Lingga", r: "Inovator",       img: "P1.png", color: "#f59e0b" }
];

// Bola Bola Partikel
function createParticles() {
  const bg = $("particles-bg");
  for (let i = 0; i < 18; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    const size = Math.random() * 16 + 6;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random() * 100}%;
      animation-duration:${Math.random() * 12 + 10}s;
      animation-delay:${Math.random() * 10}s;
    `;
    bg.appendChild(p);
  }
}

// gtw apa ini dari tutor yutub
function loadMenu() {
  menuData = getMenuData();
  renderMenu("makanan");
  renderMenu("minuman");
  renderBestPreview();
}

// untuk update 
window.addEventListener("storage", e => {
  if (e.key === "kg_extra_menu") loadMenu();
});

createParticles();
cekKantin();
setInterval(cekKantin, 60000);
loadMenu();
</script>
