<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KantinGo - Rating</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f4f6f9;
      }
      @keyframes slideLeft {
        from {
          transform: translateX(-100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      .animate-slide {
        animation: slideLeft 0.5s ease-out;
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <a
            href="index.html"
            class="btn btn-sm btn-outline-secondary mb-3 rounded-pill"
            ><i class="bi bi-arrow-left"></i> Kembali</a
          >

          <div class="card border-0 shadow-sm rounded-4 p-4">
            <h4 class="fw-bold mb-4 text-center" style="color: #21a72abb">
              Kasih Nilai Yuk!
            </h4>

            <form id="ratingForm">
              <div class="mb-3">
                <label class="form-label small fw-bold">Nama</label>
                <input
                  type="text"
                  id="nama"
                  class="form-control rounded-3"
                  placeholder="Nama kamu..."
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label small fw-bold">Bintang</label>
                <select id="bintang" class="form-select rounded-3" required>
                  <option value="5">⭐⭐⭐⭐⭐ Sangat Enak</option>
                  <option value="4">⭐⭐⭐⭐ Enak</option>
                  <option value="3">⭐⭐⭐ Biasa Saja</option>
                  <option value="3">⭐⭐ Kembangkan Lagi</option>
                  <option value="3">⭐ Perbaiki Lagi</option>
                </select>
              </div>

              <div class="mb-4">
                <label class="form-label small fw-bold">Pesan</label>
                <textarea
                  id="pesan"
                  class="form-control rounded-3"
                  rows="3"
                  placeholder="Ceritain rasa makanannya..."
                ></textarea>
              </div>

              <button
                type="submit"
                class="btn w-100 rounded-pill fw-bold"
                style="
                  background-color: #21a72abb;
                  border-color: #21a72abb;
                  color: white;
                "
              >
                Kirim Rating
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="toast-container position-fixed bottom-0 start-0 p-3">
      <div
        id="notif"
        class="toast align-items-center text-white bg-dark border-0 shadow-lg"
        role="alert"
      >
        <div class="d-flex p-2">
          <div class="toast-body">
            <i class="bi bi-check-circle-fill text-success me-2"></i>
            <span id="txtNotif"></span>
          </div>
          <button
            type="button"
            class="btn-close btn-close-white me-2 m-auto"
            data-bs-dismiss="toast"
          ></button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.getElementById("ratingForm").onsubmit = function (e) {
        e.preventDefault();

        const nama = document.getElementById("nama").value;
        const toastEl = document.getElementById("notif");

        document.getElementById("txtNotif").innerText =
          "Mantap " + nama + "! Rating sudah masuk.";
        toastEl.classList.add("animate-slide");

        bootstrap.Toast.getOrCreateInstance(toastEl).show();

        this.reset();

        setTimeout(() => {
          window.location.href = "index.html";
        }, 2500);
      };
    </script>
  </body>
</html>
