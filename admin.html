<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KantinGo — Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --green: #21a72a;
      --green-a: rgba(33,167,42,.85);
      --green-soft: rgba(33,167,42,.1);
      --red: #e74c3c;
      --bg: #f0f4f8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(33,167,42,.3); border-radius: 99px; }

    .t-main { color: var(--green-a) !important; }
    .b-main { background: var(--green-a) !important; }

    /* ── TOPBAR ── */
    .topbar {
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 1px 0 rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .brand { font-size: 1.15rem; font-weight: 800; color: var(--green-a); display: flex; align-items: center; gap: 8px; }
    .admin-badge {
      background: var(--green-soft); color: var(--green);
      border: 1px solid rgba(33,167,42,.2);
      font-size: .62rem; font-weight: 700; padding: 2px 10px; border-radius: 20px;
    }

    /* ── LOGIN ── */
    #login-screen {
      position: fixed; inset: 0; background: var(--bg);
      z-index: 999; display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: #fff; border-radius: 24px; padding: 40px 32px;
      width: 100%; max-width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,.12);
      text-align: center;
      animation: loginPop .5s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes loginPop {
      from { opacity: 0; transform: translateY(20px) scale(.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .login-box h2 { color: var(--green-a); font-weight: 800; margin-bottom: 4px; }
    .login-icon {
      font-size: 3.5rem; margin-bottom: 12px; display: block;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    /* ── TABS ── */
    .tab-bar {
      display: flex; gap: 4px;
      background: #fff; border-radius: 40px; padding: 4px;
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
    }
    .tab-bar button {
      border: none; background: transparent; border-radius: 30px;
      padding: 8px 22px; font-weight: 700; font-size: .82rem;
      color: #777; transition: background .2s, color .2s, transform .15s;
      font-family: inherit; cursor: pointer;
    }
    .tab-bar button.active { background: var(--green-a); color: #fff; }
    .tab-bar button:not(.active):hover { background: var(--green-soft); color: var(--green); }
    .tab-bar button:active { transform: scale(.94); }

    /* ── FORM CARD ── */
    .form-card {
      background: #fff; border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,.07); padding: 24px;
      animation: slideUp .4s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .form-label { font-weight: 700; font-size: .78rem; color: #555; margin-bottom: 4px; display: block; }
    .form-control, .form-select {
      border-radius: 12px; border: 1.5px solid #e0e6ef;
      padding: 10px 14px; font-family: inherit; font-size: .88rem;
      transition: border-color .2s, box-shadow .2s; width: 100%;
    }
    .form-control:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px var(--green-soft);
      outline: none;
    }

    /* ── SUBMIT BUTTON ── */
    .btn-add {
      background: var(--green-a); color: #fff; border: none;
      border-radius: 14px; padding: 13px; font-weight: 700;
      font-size: .9rem; width: 100%;
      transition: transform .15s, box-shadow .15s, background .2s;
      font-family: inherit; cursor: pointer;
    }
    .btn-add:hover { box-shadow: 0 6px 20px rgba(33,167,42,.35); transform: translateY(-1px); }
    .btn-add:active { transform: scale(.97); }
    .btn-add:disabled { opacity: .5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    /* ── TOGGLE SWITCH ── */
    .toggle-wrap { display: flex; align-items: center; gap: 10px; }
    .toggle-switch { position: relative; width: 46px; height: 26px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #d0d8e4; border-radius: 26px;
      transition: background .3s;
    }
    .toggle-slider:before {
      position: absolute; content: ""; height: 20px; width: 20px;
      left: 3px; bottom: 3px; background: #fff; border-radius: 50%;
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
    }
    input:checked + .toggle-slider { background: var(--green-a); }
    input:checked + .toggle-slider:before { transform: translateX(20px); }

    /* ── UPLOAD ── */
    .upload-area {
      border: 2px dashed #d0d8e4; border-radius: 14px; padding: 22px;
      text-align: center; cursor: pointer; transition: border-color .2s, background .2s;
      background: #fafbfc; position: relative; overflow: hidden;
    }
    .upload-area:hover { border-color: var(--green); background: var(--green-soft); }
    .upload-area input[type=file] {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; width: 100%; height: 100%;
    }
    .upload-area i { font-size: 2.2rem; color: #ccc; display: block; margin-bottom: 8px; transition: transform .3s, color .2s; }
    .upload-area:hover i { transform: translateY(-4px); color: var(--green); }
    .upload-area p { margin: 0; font-size: .82rem; color: #aaa; line-height: 1.5; }
    .img-preview-box {
      width: 100%; height: 150px; object-fit: cover; border-radius: 12px;
      border: 2px solid #e0e6ef; display: none; margin-top: 10px;
      transition: opacity .3s;
    }
    .img-preview-box.show { display: block; animation: fadeImg .3s ease; }
    @keyframes fadeImg {
      from { opacity: 0; transform: scale(.97); }
      to   { opacity: 1; transform: scale(1); }
    }
    .upload-status { font-size: .75rem; margin-top: 6px; font-weight: 600; min-height: 18px; }

    /* ── MENU LIST ITEM ── */
    .menu-item-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      padding: 14px; display: flex; gap: 12px; align-items: center;
      margin-bottom: 10px;
      transition: transform .2s, box-shadow .2s;
      animation: itemIn .3s cubic-bezier(.4,0,.2,1) both;
    }
    .menu-item-card:hover { transform: translateX(3px); box-shadow: 0 4px 18px rgba(0,0,0,.1); }
    @keyframes itemIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .menu-item-card img {
      width: 62px; height: 62px; object-fit: cover;
      border-radius: 10px; flex-shrink: 0; background: #eee;
    }
    .item-info { flex-grow: 1; min-width: 0; }
    .item-info h6 { font-size: .85rem; font-weight: 700; margin: 0 0 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-info small { font-size: .72rem; color: #888; }
    .item-price { font-size: .82rem; font-weight: 700; color: var(--green-a); }

    .btn-del {
      background: #fee2e2; border: none; border-radius: 10px;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      color: var(--red); cursor: pointer; transition: background .2s, transform .15s; flex-shrink: 0;
    }
    .btn-del:hover { background: var(--red); color: #fff; }
    .btn-del:active { transform: scale(.88); }

    .btn-best {
      background: #fef3c7; border: none; border-radius: 10px;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      color: #d97706; cursor: pointer; transition: background .2s, transform .15s; flex-shrink: 0;
    }
    .btn-best.off { background: #f3f4f6; color: #ccc; }
    .btn-best:hover { background: #fde68a; transform: scale(1.1); }
    .btn-best:active { transform: scale(.88); }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; color: #aaa; padding: 40px 20px; animation: slideUp .3s ease; }
    .empty-state i { font-size: 3rem; opacity: .2; display: block; margin-bottom: 10px; }

    .badge-best {
      background: #fee2e2; color: var(--red);
      font-size: .6rem; font-weight: 700; padding: 2px 8px; border-radius: 20px;
    }

    /* ── SYNC DOT ── */
    .sync-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; margin-right: 5px;
      transition: background .4s;
    }
    .sync-dot.pulse { animation: syncPulse .8s ease infinite alternate; }
    @keyframes syncPulse {
      from { opacity: 1; }
      to   { opacity: .4; }
    }

    @media(max-width: 576px) {
      .topbar { padding: 12px 16px; }
      .form-card { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <span class="login-icon">🔐</span>
    <h2>KantinGo</h2>
    <p class="text-muted mb-4" style="font-size:.85rem">Admin Panel — Masuk untuk melanjutkan</p>
    <input type="password" id="pass-input" class="form-control mb-3" placeholder="Password Admin"
      onkeyup="if(event.key==='Enter')doLogin()" style="text-align:center;letter-spacing:3px">
    <button class="btn-add" onclick="doLogin()"><i class="bi bi-unlock me-2"></i>Masuk</button>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand"><i class="bi bi-shop-window"></i> KantinGo <span class="admin-badge ms-1">ADMIN</span></div>
  <div class="d-flex align-items-center gap-2">
    <span id="sync-indicator" class="text-muted" style="font-size:.72rem"></span>
    <button class="btn btn-sm btn-outline-secondary rounded-pill px-3" onclick="logout()"
      style="transition:.15s" title="Keluar">
      <i class="bi bi-box-arrow-right"></i>
    </button>
  </div>
</div>

<div class="container py-4" style="max-width:680px">

  <!-- TABS -->
  <div class="d-flex justify-content-center mb-4" style="animation: slideUp .35s ease both">
    <div class="tab-bar">
      <button class="active" id="tab-makanan" onclick="switchTab('makanan')">
        <i class="bi bi-egg-fried me-1"></i>Makanan
      </button>
      <button id="tab-minuman" onclick="switchTab('minuman')">
        <i class="bi bi-cup-straw me-1"></i>Minuman
      </button>
    </div>
  </div>

  <!-- FORM TAMBAH -->
  <div class="form-card mb-4" style="animation-delay:.05s">
    <h6 class="fw-bold mb-3 t-main">
      <i class="bi bi-plus-circle me-2"></i>Tambah <span id="form-type-label">Makanan</span>
    </h6>
    <div class="row g-3">
      <div class="col-12">
        <label class="form-label">Nama Menu *</label>
        <input type="text" id="f-nama" class="form-control" placeholder="Contoh: Nasi Goreng Spesial">
      </div>
      <div class="col-6">
        <label class="form-label">Harga (Rp) *</label>
        <input type="number" id="f-harga" class="form-control" placeholder="8000" min="0">
      </div>
      <div class="col-6">
        <label class="form-label">Kategori</label>
        <input type="text" id="f-kategori" class="form-control" placeholder="Nasi / Mie / Jus">
      </div>
      <div class="col-12">
        <label class="form-label">Deskripsi</label>
        <input type="text" id="f-desc" class="form-control" placeholder="Singkat, misal: Pedas + telur + sayur">
      </div>
      <div class="col-12">
        <label class="form-label">Foto Menu</label>
        <div class="upload-area" id="upload-area">
          <input type="file" id="f-img-file" accept="image/*" onchange="handleUpload(this)">
          <i class="bi bi-cloud-arrow-up"></i>
          <p>Tap untuk pilih foto<br><span style="font-size:.72rem;color:#bbb">JPG, PNG, WEBP — maks 5MB</span></p>
        </div>
        <img id="img-preview-box" class="img-preview-box" src="" alt="preview"
          onerror="this.classList.remove('show')">
        <div id="upload-status" class="upload-status text-muted"></div>
        <input type="hidden" id="f-img">
      </div>
      <div class="col-12">
        <div class="toggle-wrap">
          <label class="toggle-switch">
            <input type="checkbox" id="f-best">
            <span class="toggle-slider"></span>
          </label>
          <span style="font-size:.85rem;font-weight:600">Tandai <span style="color:var(--red)">🔥 Best Seller</span></span>
        </div>
      </div>
      <div class="col-12">
        <button class="btn-add" id="btn-submit" onclick="tambahMenu()">
          <i class="bi bi-plus-lg me-2"></i>Tambah ke Menu
        </button>
      </div>
    </div>
  </div>

  <!-- DAFTAR MENU -->
  <div class="d-flex align-items-center justify-content-between mb-3" style="animation: slideUp .4s .1s both">
    <h6 class="fw-bold m-0 t-main">
      <i class="bi bi-list-ul me-2"></i>Daftar <span id="list-type-label">Makanan</span>
    </h6>
    <span id="item-count" class="text-muted" style="font-size:.78rem"></span>
  </div>
  <div id="menu-list"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ============================================================
// CONFIG
// ============================================================
const IMGBB_API_KEY     = "181c37c295a5af7fbc3640042edea412";
const CLOUDINARY_CLOUD  = "deshlk5ef";
const CLOUDINARY_PRESET = "kantingo_upload";
const JSONBIN_BIN_ID    = "69f9485836566621a82699c4";
const JSONBIN_API_KEY   = "$2a$10$yeNFeh35hEUuTVcEY4znkuLrYqTqLCZMpioDuaGPnZD0pGJJgAgLK";
const ADMIN_PASSWORD    = "ellao";
// ============================================================

const BIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
const $ = id => document.getElementById(id);

let menuData      = { makanan: [], minuman: [] };
let activeTab     = "makanan";
let uploadedImgUrl = "";

/* ─── LOGIN ─── */
const doLogin = () => {
  if ($("pass-input").value === ADMIN_PASSWORD) {
    const screen = $("login-screen");
    screen.style.transition = "opacity .4s, transform .4s";
    screen.style.opacity = "0";
    screen.style.transform = "scale(1.04)";
    setTimeout(() => { screen.style.display = "none"; }, 420);
    localStorage.setItem("kg_admin", "1");
    init();
  } else {
    $("pass-input").style.borderColor = "#e74c3c";
    $("pass-input").style.animation   = "shake .4s ease";
    $("pass-input").value = "";
    $("pass-input").placeholder = "❌ Password salah!";
    setTimeout(() => {
      $("pass-input").style.borderColor = "";
      $("pass-input").style.animation   = "";
      $("pass-input").placeholder = "Password Admin";
    }, 1800);
  }
};

// Shake keyframe (inject once)
const shakeStyle = document.createElement("style");
shakeStyle.textContent = `@keyframes shake {
  0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }`;
document.head.appendChild(shakeStyle);

const logout = () => { localStorage.removeItem("kg_admin"); location.reload(); };

if (localStorage.getItem("kg_admin") === "1") {
  $("login-screen").style.display = "none";
  init();
}

function init() {
  loadMenu();
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") loadMenu();
  });
}

/* ─── JSONBIN ─── */
async function loadMenu() {
  setSyncStatus("loading", "Memuat...");
  try {
    const res = await fetch(`${BIN_URL}/latest`, {
      headers: { "X-Master-Key": JSONBIN_API_KEY },
      cache: "no-store"
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const data = json.record;
    menuData.makanan = Array.isArray(data.makanan) ? data.makanan : [];
    menuData.minuman = Array.isArray(data.minuman) ? data.minuman : [];
    setSyncStatus("ok", "Tersinkron");
  } catch (e) {
    console.error("Load gagal:", e);
    setSyncStatus("error", "Gagal load");
  }
  renderList();
}

async function saveMenu() {
  setSyncStatus("loading", "Menyimpan...");
  try {
    const res = await fetch(BIN_URL, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": JSONBIN_API_KEY
      },
      body: JSON.stringify({ makanan: menuData.makanan, minuman: menuData.minuman })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    await res.json();
    setSyncStatus("ok", "Tersimpan ✓");
    return true;
  } catch (e) {
    console.error("Save gagal:", e);
    setSyncStatus("error", "Gagal simpan!");
    Swal.fire({ icon:"error", title:"Gagal Simpan!", text:`Error: ${e.message}`, confirmButtonColor:"#21a72a" });
    return false;
  }
}

const setSyncStatus = (state, text) => {
  const colors = { ok:"#21a72a", error:"#e74c3c", loading:"#f59e0b" };
  const pulse  = state === "loading" ? " pulse" : "";
  $("sync-indicator").innerHTML =
    `<span class="sync-dot${pulse}" style="background:${colors[state]}"></span>${text}`;
};

/* ─── TABS ─── */
const switchTab = t => {
  activeTab = t;
  $("tab-makanan").classList.toggle("active", t === "makanan");
  $("tab-minuman").classList.toggle("active", t === "minuman");
  $("form-type-label").textContent = t === "makanan" ? "Makanan" : "Minuman";
  $("list-type-label").textContent = t === "makanan" ? "Makanan" : "Minuman";
  renderList();
};

/* ─── UPLOAD GAMBAR ─── */
const readFileAsBase64 = file => new Promise((resolve, reject) => {
  const r = new FileReader();
  r.onload = e => resolve(e.target.result);
  r.onerror = reject;
  r.readAsDataURL(file);
});

const handleUpload = async input => {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    setUploadStatus("❌ File max 5MB!", "text-danger");
    input.value = "";
    return;
  }

  uploadedImgUrl = "";
  $("f-img").value = "";

  const base64 = await readFileAsBase64(file);
  $("img-preview-box").src = base64;
  $("img-preview-box").classList.add("show");
  $("upload-area").querySelector("p").innerHTML =
    `<strong style="color:#333">${file.name}</strong><br>
     <span style="font-size:.7rem;color:#aaa">${(file.size/1024).toFixed(0)} KB</span>`;

  setUploadStatus("⏳ Mengupload gambar...", "text-warning");
  $("btn-submit").disabled = true;

  try {
    // Coba Cloudinary dulu
    try {
      const cForm = new FormData();
      cForm.append("file", file);
      cForm.append("upload_preset", CLOUDINARY_PRESET);
      const cRes  = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
        method: "POST", body: cForm
      });
      const cJson = await cRes.json();
      if (!cJson.secure_url) throw new Error("No URL");
      uploadedImgUrl = cJson.secure_url;
    } catch {
      // Fallback ImgBB
      const form = new FormData();
      form.append("image", file);
      const res  = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
        method: "POST", body: form
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.error?.message || "Upload gagal");
      uploadedImgUrl = json.data.image ? json.data.image.url : json.data.url;
    }
    $("f-img").value = uploadedImgUrl;
    setUploadStatus("✅ Gambar berhasil diupload!", "text-success");
  } catch (e) {
    console.warn("Upload gagal:", e);
    if (file.size < 100 * 1024) {
      uploadedImgUrl = base64;
      $("f-img").value = base64;
      setUploadStatus("✅ Gambar siap (mode lokal)", "text-success");
    } else {
      uploadedImgUrl = "";
      $("f-img").value = "";
      $("img-preview-box").classList.remove("show");
      setUploadStatus("❌ Upload gagal. Pakai gambar lebih kecil.", "text-danger");
    }
  } finally {
    $("btn-submit").disabled = false;
  }
};

const setUploadStatus = (msg, cls) => {
  const el = $("upload-status");
  el.textContent = msg;
  el.className = `upload-status ${cls}`;
};

/* ─── TAMBAH MENU ─── */
const tambahMenu = async () => {
  const nama  = $("f-nama").value.trim();
  const harga = parseInt($("f-harga").value);
  if (!nama)               { highlight("f-nama",  "Nama wajib diisi!"); return; }
  if (!harga || harga <= 0){ highlight("f-harga", "Harga tidak valid!"); return; }

  if ($("upload-status").textContent.includes("Mengupload")) {
    Swal.mixin({ toast:true, position:"top", showConfirmButton:false, timer:2000 })
      .fire({ icon:"warning", title:"⏳ Tunggu gambar selesai diupload!" });
    return;
  }

  $("btn-submit").disabled = true;
  $("btn-submit").innerHTML = '<i class="bi bi-hourglass-split me-2"></i>Menyimpan...';

  const newItem = {
    id: Date.now(),
    nama,
    harga,
    desc:     $("f-desc").value.trim() || "-",
    img:      uploadedImgUrl || "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=400",
    kategori: $("f-kategori").value.trim() || "Umum",
    best:     $("f-best").checked
  };

  menuData[activeTab].push(newItem);
  renderList();

  const ok = await saveMenu();
  if (!ok) {
    menuData[activeTab].pop();
    renderList();
  } else {
    resetForm();
    Swal.mixin({ toast:true, position:"top", showConfirmButton:false, timer:2000 })
      .fire({ icon:"success", title:`✅ ${newItem.nama} berhasil ditambah!` });
  }

  $("btn-submit").disabled = false;
  $("btn-submit").innerHTML = '<i class="bi bi-plus-lg me-2"></i>Tambah ke Menu';
};

/* ─── HAPUS & TOGGLE BEST ─── */
const hapusMenu = async (type, id) => {
  const item = menuData[type].find(i => i.id === id);
  const result = await Swal.fire({
    title: `Hapus "${item?.nama}"?`,
    text: "Menu ini akan dihapus permanen.",
    icon: "warning",
    showCancelButton: true,
    confirmButtonColor: "#e74c3c",
    cancelButtonColor: "#aaa",
    confirmButtonText: "Ya, hapus!",
    cancelButtonText: "Batal"
  });
  if (!result.isConfirmed) return;
  menuData[type] = menuData[type].filter(i => i.id !== id);
  renderList();
  await saveMenu();
};

const toggleBest = async (type, id) => {
  const item = menuData[type].find(i => i.id === id);
  if (item) item.best = !item.best;
  renderList();
  await saveMenu();
};

/* ─── RENDER LIST ─── */
const renderList = () => {
  const items = menuData[activeTab] || [];
  $("item-count").textContent = `${items.length} item`;
  if (!items.length) {
    $("menu-list").innerHTML = `
      <div class="empty-state">
        <i class="bi bi-inbox"></i>
        <p>Belum ada menu.<br>Tambahkan lewat form di atas.</p>
      </div>`;
    return;
  }
  $("menu-list").innerHTML = [...items].reverse().map((i, idx) => `
    <div class="menu-item-card" style="animation-delay:${Math.min(idx * .04, .25)}s">
      <img src="${i.img || ''}" alt="${i.nama}" loading="lazy"
        onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=200'">
      <div class="item-info">
        <div class="d-flex align-items-center gap-1 mb-1">
          <h6>${i.nama}</h6>
          ${i.best ? `<span class="badge-best">🔥 Best</span>` : ''}
        </div>
        <small>${i.desc} · <em>${i.kategori}</em></small><br>
        <span class="item-price">Rp ${Number(i.harga).toLocaleString("id-ID")}</span>
      </div>
      <div class="d-flex flex-column gap-2">
        <button class="btn-best ${i.best ? '' : 'off'}" title="Toggle Best"
          onclick="toggleBest('${activeTab}',${i.id})">
          <i class="bi bi-fire"></i>
        </button>
        <button class="btn-del" title="Hapus"
          onclick="hapusMenu('${activeTab}',${i.id})">
          <i class="bi bi-trash"></i>
        </button>
      </div>
    </div>`).join('');
};

/* ─── RESET FORM ─── */
const resetForm = () => {
  ["f-nama","f-harga","f-desc","f-kategori"].forEach(id => $(id).value = "");
  $("f-img").value = "";
  $("f-img-file").value = "";
  $("f-best").checked = false;
  uploadedImgUrl = "";
  $("img-preview-box").classList.remove("show");
  $("img-preview-box").src = "";
  $("upload-status").textContent = "";
};

const highlight = (id, msg) => {
  const el = $(id);
  el.style.borderColor = "#e74c3c";
  el.style.animation = "shake .4s ease";
  el.placeholder = msg;
  el.focus();
  setTimeout(() => {
    el.style.borderColor = "";
    el.style.animation = "";
  }, 2000);
};
</script>
</body>
</html>
